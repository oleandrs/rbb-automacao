name: Deploy Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy to Hostinger via FTP
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            set ssl:verify-certificate no;
            open -u ${FTP_USERNAME},${FTP_PASSWORD} ${FTP_HOST};
            cd public_html;
            mirror -R \
              --delete \
              --verbose \
              --exclude-glob .git* \
              --exclude-glob README.md \
              --exclude-glob alteracoes-site.patch \
              --exclude-glob smtp-config.local.php \
              --exclude-glob .github \
              ./ ./;
          "
